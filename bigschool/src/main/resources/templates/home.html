<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Big School</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

body{
background:#f5f5f5;
}

.course{
background:white;
padding:15px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
display:flex;
align-items:center;
}

.date{
width:70px;
height:70px;
background:red;
color:white;
text-align:center;
border-radius:8px;
margin-right:15px;
display:flex;
flex-direction:column;
justify-content:center;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
margin-right:5px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">

<a class="navbar-brand text-white" href="/home">
Home
</a>

<a class="navbar-brand text-white" href="/courses/create">
Add Course
</a>

<div class="d-flex ms-auto">

<input id="username"
placeholder="username"
class="form-control me-2">

<button onclick="login()" class="btn btn-success me-3">
Login
</button>

<div class="dropdown" id="userMenu" style="display:none;">

<button class="btn btn-dark dropdown-toggle"
data-bs-toggle="dropdown">

<img src="https://i.pravatar.cc/40"
class="avatar">

<span id="userDisplay"></span>

</button>

<ul class="dropdown-menu">

<li>
<a class="dropdown-item" href="#"
onclick="loadMyCourses()">
Course I am going
</a>
</li>

<li>
<a class="dropdown-item" href="#"
onclick="loadFollowing()">
Lecture I am following
</a>
</li>

<li>
<a class="dropdown-item" href="#"
onclick="logout()">
Logout
</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="container mt-4">

<h3>Upcoming Courses</h3>

<div class="mb-3">

<button onclick="loadCourses()" class="btn btn-primary btn-sm">
Upcoming Courses
</button>

</div>

<div class="mb-3">

<input id="search"
placeholder="Search lecture or place"
class="form-control">

<button onclick="searchCourse()"
class="btn btn-info btn-sm mt-2">
Search
</button>

</div>

<div id="courseList"></div>

</div>

<footer class="text-center mt-4">
BigSchool Demo
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let user = localStorage.getItem("user") || "guest"



if(user !== "guest"){

document.getElementById("userDisplay").innerText = user

document.getElementById("userMenu").style.display="block"

}



function login(){

let u=document.getElementById("username").value

if(u===""){
alert("Enter username")
return
}

user=u

localStorage.setItem("user",user)

document.getElementById("userDisplay").innerText=user

document.getElementById("userMenu").style.display="block"

alert("Login success: "+user)

}



function logout(){

localStorage.removeItem("user")

location.href="/"

}



async function loadCourses(){

let res=await fetch("/api/courses")

let data=await res.json()

renderCourses(data)

}



function renderCourses(data){

let html=""

data.forEach(c=>{

let d=new Date(c.dateTime)

let day=d.getDate()

let month=d.toLocaleString('en',{month:'short'}).toUpperCase()

html+=`

<div class="course">

<div class="date">
<b>${day}</b>
<span>${month}</span>
</div>

<div>

<h5>${c.lectureId}</h5>

<p>${c.place}</p>

<button class="btn btn-primary btn-sm"
onclick="joinCourse(${c.id})">
Going?
</button>

<button class="btn btn-warning btn-sm"
onclick="editCourse(${c.id})">
Edit
</button>

<button class="btn btn-danger btn-sm"
onclick="deleteCourse(${c.id})">
Delete
</button>

</div>

</div>

`

})

document.getElementById("courseList").innerHTML=html

}



async function joinCourse(id){

if(user==="guest"){
alert("Please login first")
return
}

await fetch("/api/attendance/join?courseId="+id+"&user="+user,{
method:"POST"
})

alert("Joined!")

}



async function deleteCourse(id){

await fetch("/api/courses/"+id,{
method:"DELETE"
})

alert("Deleted!")

loadCourses()

}



function editCourse(id){

location.href="/courses/edit/"+id

}



async function loadMyCourses(){

let res=await fetch("/api/attendance/mycourse?user="+user)

let data=await res.json()

renderCourses(data)

}



async function loadFollowing(){

let res=await fetch("/api/follow/myfollowing?user="+user)

let data=await res.json()

renderCourses(data)

}



async function searchCourse(){

let keyword=document.getElementById("search").value.toLowerCase()

let res=await fetch("/api/courses")

let data=await res.json()

let filter=data.filter(c=>

c.place.toLowerCase().includes(keyword) ||

c.lectureId.toLowerCase().includes(keyword)

)

renderCourses(filter)

}



loadCourses()

</script>

</body>
</html>
